// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    // https://mvnrepository.com/artifact/org.jetbrains.kotlin.android/org.jetbrains.kotlin.android.gradle.plugin
    ext.kotlin_version = '1.9.25'
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven { url 'https://jitpack.io' }
    }
    dependencies {
        // https://mvnrepository.com/artifact/com.android.application/com.android.application.gradle.plugin
        classpath 'com.android.tools.build:gradle:8.9.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files

        //JReleaser Gradle Plugin: https://plugins.gradle.org/plugin/org.jreleaser
        classpath("org.jreleaser:org.jreleaser.gradle.plugin:1.23.0")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

apply from: "$gradleHost/master/local.gradle"
